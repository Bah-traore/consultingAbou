version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: consulting-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-consulting_db}
      POSTGRES_USER: ${POSTGRES_USER:-consulting_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-consulting_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: consulting-backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-consulting_user}:${POSTGRES_PASSWORD:-consulting_password_change_me}@db:5432/${POSTGRES_DB:-consulting_db}
      - SECRET_KEY=${SECRET_KEY:-production_secret_key_change_me}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:3000}
      # Cloudflare R2 configurations
      - USE_R2_MEDIA=${USE_R2_MEDIA:-True}
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_REGION_NAME=${R2_REGION_NAME:-auto}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_CUSTOM_DOMAIN=${R2_CUSTOM_DOMAIN}
      - R2_LOCATION=${R2_LOCATION}
      - COMPTA_DOCS_R2_MODE=${COMPTA_DOCS_R2_MODE:-stream}
      - R2_MEDIA_LOCATION=${R2_MEDIA_LOCATION:-media}
      - R2_PUBLIC_MEDIA_LOCATION=${R2_PUBLIC_MEDIA_LOCATION:-public}
      - R2_SENSITIVE_MEDIA_LOCATION=${R2_SENSITIVE_MEDIA_LOCATION:-private}
    volumes:
      - backend_media:/app/media
    networks:
      - default
      - nginx-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_R2_CUSTOM_DOMAIN=${NEXT_PUBLIC_R2_CUSTOM_DOMAIN}
    container_name: consulting-frontend
    restart: always
    environment:
      - PORT=3000
    depends_on:
      - backend
    networks:
      - default
      - nginx-network

volumes:
  postgres_data:
  backend_media:

networks:
  default:
    driver: bridge
  nginx-network:
    name: nginx-proxy-manager_default
    external: true
